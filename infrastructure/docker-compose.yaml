services:
  # 1. Source Database (Simulating a Core Banking System)
  core-banking-db:
    image: postgres:15
    container_name: core-banking-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core_banking
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - ../init-scripts/init-source.sql:/docker-entrypoint-initdb.d/init-source.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d core_banking"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. ZooKeeper (Required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 3. Apache Kafka (Message Broker for real-time streaming)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 4. Debezium Connect (Change Data Capture)
  debezium:
    image: quay.io/debezium/connect:2.3
    container_name: debezium
    depends_on:
      - kafka
      - core-banking-db
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses

  # 5. Transformation Service (Mapping Source -> BCDM)
  # This acts as an intermediary stream processor. We will implement this as a Python/Faust app later.
  transformer:
    build: ../src/transformer
    depends_on:
      - kafka
      - ods-db

  # 6. ODS Database (The Operational Data Store)
  ods-db:
    image: postgres:15
    container_name: ods-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ods
    ports:
      - "5433:5432"
    volumes:
      - ../init-scripts/init-ods.sql:/docker-entrypoint-initdb.d/01-init-ods.sql
      - ../init-scripts/setup_approach3.sql:/docker-entrypoint-initdb.d/02-setup_approach3.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ods"]
      interval: 5s
      timeout: 5s
      retries: 5
