services:
  # 1. Source Database (Simulating a Core Banking System)
  core-banking-db:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.core-banking-db
    container_name: core-banking-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core_banking
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d core_banking"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. ZooKeeper (Required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q 'Mode:'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 3. Apache Kafka (Message Broker for real-time streaming)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: on-failure

  # 4. Debezium Connect (Change Data Capture)
  debezium:
    image: quay.io/debezium/connect:2.3
    container_name: debezium
    depends_on:
      kafka:
        condition: service_healthy
      core-banking-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    restart: on-failure

  # 5. Transformation Service (Mapping Source -> BCDM)
  # This acts as an intermediary stream processor. We will implement this as a Python/Faust app later.
  transformer:
    build: ../src/transformer
    depends_on:
      - kafka
      - ods-db

  # 6. ODS Database (The Operational Data Store)
  ods-db:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.ods-db
    container_name: ods-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ods
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ods"]
      interval: 5s
      timeout: 5s
      retries: 5
